image: ubuntu:18.04

before_script:
  - apt-get update -qy
  - apt-get install -y lftp
  - apt-get install -y npm
  - npm install
  - whereis grunt
  - export PATH=$PATH:/usr/local/bin
  
stages:
  - test
  - build
  - deploy

test:
  stage: test
  script: 
    - npm run lint

build:
  stage: build
  script: 
    - npm run build

deploy:
  stage: deploy
  environment:
    name: Fiddle.be
    url: https://sitbe.fiddle.be
  script:
    - npm run build
    - echo "using FTP to deploy the app"
    - apt-get update -qq && apt-get install -y -qq lftp
    - lftp -c "set ftp:ssl-allow no; open -u $FTP_USER,$FTP_PASS $FTP_HOST; mirror -Rnev ./dist ./public_html/sitbe --ignore-time --parallel=10 --exclude-glob .git* --exclude .git/"
  only:
    - master
